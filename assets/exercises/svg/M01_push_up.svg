      <polyline points="372,346 372,451 372,556"/>
      <polyline points="560,392 706,425 860,460 845,512 892,556"/>
    </g>
    <g id="m01-ghost" fill="none">
      <line x1="372" y1="470" x2="560" y2="470"/>
      <line x1="372" y1="470" x2="345" y2="458"/>
      <polyline points="372,470 465,537 372,556"/>
      <polyline points="560,470 706,467 860,464 845,512 892,556"/>
