name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: morning30-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.MORNING30_DEPLOY_SSH_KEY }}" > ~/.ssh/morning30_deploy_key
          chmod 600 ~/.ssh/morning30_deploy_key
          for attempt in 1 2 3 4 5; do
            ssh-keyscan -T 10 -p "${{ secrets.MORNING30_DEPLOY_PORT }}" "${{ secrets.MORNING30_DEPLOY_HOST }}" >> ~/.ssh/known_hosts && break
            sleep 3
          done

      - name: Upload release
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='.tooling' \
            --exclude='morning.db' \
            --exclude='morning.db-*' \
            -czf - . | ssh \
              -i ~/.ssh/morning30_deploy_key \
              -p "${{ secrets.MORNING30_DEPLOY_PORT }}" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              "${{ secrets.MORNING30_DEPLOY_USER }}@${{ secrets.MORNING30_DEPLOY_HOST }}" \
              "set -euo pipefail; mkdir -p '${{ secrets.MORNING30_DEPLOY_PATH }}'; find '${{ secrets.MORNING30_DEPLOY_PATH }}' -mindepth 1 -maxdepth 1 -exec rm -rf {} +; tar -xzf - -C '${{ secrets.MORNING30_DEPLOY_PATH }}'"

      - name: Rebuild and restart
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/morning30_deploy_key \
            -p "${{ secrets.MORNING30_DEPLOY_PORT }}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${{ secrets.MORNING30_DEPLOY_USER }}@${{ secrets.MORNING30_DEPLOY_HOST }}" \
            "cd '${{ secrets.MORNING30_DEPLOY_PATH }}' && docker compose -f deploy/docker-compose.yml up -d --build"
